name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      e2e_base_url:
        description: Optional BFF base URL. Leave blank to start the app locally in the test run.
        required: false
        type: string

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUN_E2E: "1"
      E2E_BASE_URL: ${{ inputs.e2e_base_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run end-to-end tests
        run: python -m pytest -m e2e -q
